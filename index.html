<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Teacher Planner SD 2026 - Multi-Kelas (1-6)</title>
<!--
  =====================================================================
  TEACHER PLANNER SD 2026 - MULTI-KELAS (KELAS 1-6)  (SINGLE FILE APPLICATION)
  ---------------------------------------------------------------------
  - 100% offline, tanpa server, tanpa build process.
  - Semua data disimpan di localStorage perangkat (tidak terkirim ke
    mana pun). Buka file ini langsung dari browser di Xiaomi Pad 7 Pro
    (atau perangkat lain) untuk mulai memakainya.
  - Pemilih "Kelas Aktif" di bagian atas aplikasi menentukan data siswa,
    kehadiran, nilai, jurnal, jadwal, dsb. yang ditampilkan. Data setiap
    kelas disimpan TERPISAH (kunci localStorage berbeda per kelas) agar
    tidak pernah tercampur. Data guru/tendik, profil sekolah, dan
    kalender pendidikan bersifat sekolah (dipakai bersama semua kelas).
  - Data Kelas 1 (siswa, guru, tendik) diambil dari dokumen resmi yang
    diunggah (Dapodik / Data Siswa 2026-2027 / KOP Surat SDN 1
    Gerduren). Kelas 2-6 dimulai KOSONG (tidak ada data karangan) dan
    siap diisi Bapak/Ibu Guru lewat menu masing-masing.
  - Aplikasi versi sebelumnya (satu kelas) otomatis dimigrasikan satu
    kali menjadi data "Kelas 1" saat file ini pertama kali dibuka --
    tidak ada data lama yang hilang.
  - CATATAN JUJUR TENTANG BATASAN (baca menu "Tentang Aplikasi" di
    Pengaturan): ekspor "Word" & "Excel" dibuat memakai teknik HTML
    yang dibaca native oleh Ms Word / Ms Excel (tanpa pustaka
    eksternal, tetap offline). Ekspor PDF memakai print-to-PDF bawaan
    browser. Konversi tulisan tangan ke teks (OCR) TIDAK tersedia
    offline murni HTML/JS - lihat penjelasan pada menu Tulisan Tangan.
  =====================================================================
-->
<style>
/* ==================== DESIGN TOKENS ==================== */
:root{
  --bg:#f2f4f8; --bg-alt:#e9edf5; --surface:#ffffffcc; --surface-solid:#ffffff;
  --text:#1c2333; --text-soft:#5b6478; --border:#dde2ec;
  --primary:#3457d5; --primary-dark:#2540a8; --primary-soft:#e8edfc;
  --accent:#0f9d78; --accent-soft:#e1f7ef;
  --warn:#c77c11; --warn-soft:#fdf1de;
  --danger:#d64545; --danger-soft:#fbe6e6;
  --radius:16px; --radius-sm:10px;
  --shadow:0 8px 24px rgba(30,40,80,.08), 0 2px 6px rgba(30,40,80,.06);
  --shadow-lg:0 20px 50px rgba(20,30,70,.18);
  --sidebar-w:270px;
  --font: "Segoe UI", "Poppins", -apple-system, "Noto Sans", Roboto, Arial, sans-serif;
}
[data-theme="dark"]{
  --bg:#11141c; --bg-alt:#171b26; --surface:#1c2130dd; --surface-solid:#1c2130;
  --text:#eef1fb; --text-soft:#a1a9c0; --border:#2b3247;
  --primary:#7089ff; --primary-dark:#5468d4; --primary-soft:#232b46;
  --accent:#3fd3a4; --accent-soft:#123529;
  --warn:#e3a94a; --warn-soft:#3a2c12;
  --danger:#f17272; --danger-soft:#3a1c1c;
  --shadow:0 8px 24px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.3);
  --shadow-lg:0 20px 50px rgba(0,0,0,.55);
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; font-family:var(--font); background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
  transition:background .25s ease,color .25s ease;
}
button,input,select,textarea{font-family:inherit; color:inherit;}
h1,h2,h3,h4{margin:0 0 4px; letter-spacing:.2px;}
p{margin:0 0 8px;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
a{color:var(--primary);}

/* ==================== LOCK SCREEN ==================== */
#lockScreen{
  position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#2540a8,#3457d5 45%,#0f9d78);
  color:#fff; flex-direction:column; text-align:center; padding:24px;
}
#lockScreen.hidden{display:none;}
.lock-card{
  background:rgba(255,255,255,.12); backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.25); border-radius:24px; padding:36px 30px;
  width:100%; max-width:380px; box-shadow:var(--shadow-lg);
}
.lock-logo{width:74px;height:74px;border-radius:20px;background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:var(--shadow);}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:20px 0;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #fff;transition:.15s;}
.pin-dot.filled{background:#fff;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:280px;margin:0 auto;}
.pin-pad button{
  padding:16px 0; border-radius:16px; border:none; background:rgba(255,255,255,.18);
  color:#fff; font-size:22px; font-weight:600; cursor:pointer; transition:.15s;
}
.pin-pad button:active{background:rgba(255,255,255,.4); transform:scale(.95);}
.lock-msg{min-height:20px;font-size:13px;color:#ffe1e1;margin-top:8px;}

/* ==================== APP SHELL ==================== */
#app{display:none; min-height:100vh;}
#app.ready{display:flex;}

.sidebar{
  width:var(--sidebar-w); flex-shrink:0; background:var(--surface-solid);
  border-right:1px solid var(--border); padding:18px 14px; position:fixed; top:0; bottom:0; left:0;
  overflow-y:auto; z-index:60; transition:transform .25s ease;
}
.brand{display:flex; align-items:center; gap:12px; padding:6px 8px 16px;}
.brand .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.brand .txt strong{display:block;font-size:14.5px;line-height:1.2;}
.brand .txt span{font-size:11px;color:var(--text-soft);}

.navgroup-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-soft);margin:16px 10px 6px;font-weight:700;}
.navitem{
  display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:12px;
  cursor:pointer; font-size:13.5px; font-weight:500; color:var(--text-soft); margin-bottom:2px;
  user-select:none;
}
.navitem svg{width:18px;height:18px;flex-shrink:0;}
.navitem:hover{background:var(--bg-alt); color:var(--text);}
.navitem.active{background:var(--primary); color:#fff; box-shadow:var(--shadow);}

.topbar{
  position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:12px;
  padding:14px 22px; background:var(--surface); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}
.topbar h2{font-size:18px;}
.topbar .grow{flex:1;}
.iconbtn{
  width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--surface-solid);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);
}
.iconbtn:hover{background:var(--bg-alt);}
.iconbtn svg{width:19px;height:19px;}
#menuToggle{display:none;}
.class-switcher{
  height:42px; min-width:132px; border-radius:12px; border:1.5px solid var(--primary); background:var(--primary-soft);
  color:var(--primary); font-weight:700; font-size:13.5px; padding:0 12px; cursor:pointer;
}
@media(max-width:640px){ .class-switcher{min-width:104px; font-size:12.5px; padding:0 8px;} }

.main{flex:1; margin-left:var(--sidebar-w); min-height:100vh; display:flex; flex-direction:column;}
.content{padding:20px 22px 90px; max-width:1400px; width:100%; margin:0 auto;}

.overlay-mask{position:fixed;inset:0;background:rgba(10,15,30,.45);z-index:55;display:none;}
.overlay-mask.show{display:block;}

/* ==================== CARDS / GRID ==================== */
.grid{display:grid; gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:18px; box-shadow:var(--shadow); backdrop-filter:blur(6px);
}
.card h3{font-size:14.5px;}
.stat-card{display:flex; flex-direction:column; gap:6px;}
.stat-card .icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;}
.stat-card .num{font-size:26px;font-weight:800;}
.stat-card .lbl{font-size:12.5px;color:var(--text-soft);}

.section-head{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.section-head h1{font-size:21px;}
.section-head .desc{font-size:13px;color:var(--text-soft);}
.section-head .grow{flex:1;}

/* ==================== BUTTONS ==================== */
.btn{
  display:inline-flex; align-items:center; gap:8px; padding:10px 16px; border-radius:12px;
  border:1px solid var(--border); background:var(--surface-solid); color:var(--text);
  font-size:13.5px; font-weight:600; cursor:pointer; transition:.15s; white-space:nowrap;
}
.btn svg{width:16px;height:16px;}
.btn:hover{background:var(--bg-alt);}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff;}
.btn-ghost{background:transparent;border-color:transparent;}
.btn-sm{padding:7px 11px;font-size:12.5px;border-radius:9px;}
.btn-icon{padding:9px;border-radius:10px;}
.fab{
  position:fixed; right:22px; bottom:22px; z-index:45; width:56px;height:56px;border-radius:50%;
  background:var(--primary); color:#fff; border:none; box-shadow:var(--shadow-lg);
  display:flex;align-items:center;justify-content:center; cursor:pointer;
}
.fab svg{width:24px;height:24px;}

/* ==================== FORMS ==================== */
.field{margin-bottom:13px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border);
  background:var(--surface-solid); font-size:13.5px; color:var(--text);
}
.field textarea{min-height:80px;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--primary); outline-offset:1px;}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:0 14px;}
@media(max-width:640px){.form-grid{grid-template-columns:1fr;}}
.hint{font-size:11.5px;color:var(--text-soft);margin-top:3px;}

/* ==================== TABLE ==================== */
.table-wrap{overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface);}
table{width:100%; border-collapse:collapse; font-size:13px; min-width:600px;}
thead th{
  text-align:left; padding:11px 12px; background:var(--bg-alt); color:var(--text-soft);
  font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; position:sticky; top:0;
  border-bottom:1px solid var(--border); white-space:nowrap;
}
tbody td{padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--bg-alt);}
.row-actions{display:flex;gap:6px;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-blue{background:var(--primary-soft);color:var(--primary);}
.badge-green{background:var(--accent-soft);color:var(--accent);}
.badge-orange{background:var(--warn-soft);color:var(--warn);}
.badge-red{background:var(--danger-soft);color:var(--danger);}
.toolbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px;}
.search-box{position:relative; flex:1; min-width:180px;}
.search-box input{width:100%; padding:10px 12px 10px 36px; border-radius:11px; border:1px solid var(--border); background:var(--surface-solid); font-size:13.5px;}
.search-box svg{position:absolute; left:11px; top:11px; width:16px;height:16px; color:var(--text-soft);}
.empty-state{padding:40px 20px; text-align:center; color:var(--text-soft);}
.empty-state svg{width:44px;height:44px;margin-bottom:10px;opacity:.5;}

/* ==================== MODAL ==================== */
.modal-mask{position:fixed;inset:0;background:rgba(10,14,28,.5);backdrop-filter:blur(2px);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-mask.show{display:flex;}
@media(min-width:720px){.modal-mask{align-items:center;}}
.modal{
  background:var(--surface-solid); width:100%; max-width:640px; max-height:92vh; overflow-y:auto;
  border-radius:22px 22px 0 0; box-shadow:var(--shadow-lg); animation:slideUp .2s ease;
}
@media(min-width:720px){.modal{border-radius:20px;}}
@keyframes slideUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface-solid);z-index:2;}
.modal-head h3{font-size:16px;flex:1;}
.modal-body{padding:20px;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--surface-solid);}

/* ==================== TOAST ==================== */
#toastHost{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{background:var(--text);color:var(--bg);padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);animation:toastIn .2s ease;}
[data-theme="dark"] .toast{background:#eef1fb;color:#11141c;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ==================== LETTERHEAD (KOP SURAT) ==================== */
.letterhead{display:flex;gap:14px;align-items:center;border-bottom:3px solid var(--text);padding-bottom:10px;margin-bottom:14px;}
.letterhead .lh-logo{width:62px;height:62px;border-radius:8px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--primary);}
.letterhead .lh-text{text-align:center;flex:1;}
.letterhead .lh-text h4{font-size:15px;text-transform:uppercase;margin-bottom:1px;}
.letterhead .lh-text p{font-size:11.5px;margin:0;color:var(--text-soft);}
.doc-title{text-align:center;font-weight:800;text-decoration:underline;margin:14px 0 18px;font-size:15px;}

/* ==================== TABS ==================== */
.tabs{display:flex; gap:6px; overflow-x:auto; margin-bottom:14px; border-bottom:1px solid var(--border);}
.tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--text-soft);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;}
.tab.active{color:var(--primary);border-color:var(--primary);}

/* ==================== MISC ==================== */
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:var(--primary-soft);color:var(--primary);font-size:11.5px;font-weight:700;margin:2px 3px 2px 0;}
.muted{color:var(--text-soft);}
.divider{height:1px;background:var(--border);margin:16px 0;}
.pill-toggle{display:flex;gap:6px;background:var(--bg-alt);padding:4px;border-radius:12px;}
.pill-toggle button{flex:1;padding:8px 0;border:none;background:transparent;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--text-soft);cursor:pointer;}
.pill-toggle button.active{background:var(--primary-solid,var(--primary));color:#fff;}
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:6px;}
.att-cell{padding:8px 0;text-align:center;border-radius:9px;font-size:11.5px;font-weight:800;cursor:pointer;border:1px solid var(--border);}
canvas.pen-canvas{width:100%; height:420px; touch-action:none; border-radius:14px; border:1px solid var(--border); background:#fff; cursor:crosshair;}

/* ==================== RESPONSIVE (Xiaomi Pad 7 Pro & mobile) ==================== */
@media(max-width:960px){
  .sidebar{transform:translateX(-105%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  #menuToggle{display:flex;}
}
@media(max-width:520px){
  .content{padding:14px 12px 90px;}
  .topbar{padding:12px 14px;}
  .modal-body{padding:16px;}
}

/* ==================== PRINT ==================== */
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{position:absolute;left:0;top:0;width:100%;padding:14px;color:#000;background:#fff;}
  .no-print{display:none !important;}
}
#printArea{display:none;}

/* ==================== KALENDER PENDIDIKAN - TAMPILAN GRID ==================== */
.kal-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.kal-nav{display:flex;align-items:center;gap:8px;}
.kal-nav .iconbtn{width:36px;height:36px;}
.kal-nav .label{font-size:15px;font-weight:700;min-width:150px;text-align:center;}
.kal-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;font-size:11px;color:var(--text-soft);}
.kal-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;}
.kal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.kal-weekday{text-align:center;font-size:11px;font-weight:700;color:var(--text-soft);text-transform:uppercase;padding-bottom:4px;}
.kal-cell{
  min-height:64px; border-radius:12px; border:1px solid var(--border); background:var(--surface-solid);
  padding:6px; cursor:pointer; transition:.15s; display:flex; flex-direction:column; gap:3px; position:relative;
}
.kal-cell:hover{border-color:var(--primary); box-shadow:var(--shadow);}
.kal-cell.kal-empty{background:transparent; border:none; cursor:default;}
.kal-cell.kal-empty:hover{border:none; box-shadow:none;}
.kal-cell.kal-weekend .kal-daynum{color:var(--danger);}
.kal-cell.kal-today{border:2px solid var(--primary); background:var(--primary-soft);}
.kal-daynum{font-size:13px;font-weight:700;}
.kal-dots{display:flex;flex-wrap:wrap;gap:3px;}
.kal-dots .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.kal-cell .kal-badgecount{position:absolute; top:4px; right:5px; font-size:9.5px; font-weight:800; color:var(--text-soft);}
.kal-cell .kal-bell{position:absolute; bottom:4px; right:5px; color:var(--warn);}
.ni-row-filled{background:var(--accent-soft);}
.ni-input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface-solid);font-size:13px;text-align:center;}
.ni-input:focus{outline:2px solid var(--primary);outline-offset:1px;}
@media(max-width:640px){
  .kal-cell{min-height:48px; padding:4px;}
  .kal-daynum{font-size:11.5px;}
}
</style>

<body>

<!-- =============================== LOCK SCREEN =============================== -->
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-logo">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#3457d5" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </div>
    <h2 id="lockTitle" style="font-size:17px;margin-bottom:2px;">Teacher Planner SD 2026</h2>
    <div class="muted" style="font-size:12.5px;color:#e4e9ff;margin-bottom:6px;">Kelas 1 &middot; SDN 1 Gerduren</div>
    <div id="pinArea">
      <div class="pin-dots" id="pinDots"></div>
      <div class="lock-msg" id="lockMsg">Masukkan PIN untuk membuka aplikasi</div>
      <div class="pin-pad" id="pinPad"></div>
    </div>
    <div id="noPinArea" style="display:none;">
      <p style="font-size:13px;color:#eef1ff;margin:10px 0 16px;">Aplikasi belum dikunci PIN.</p>

    </div>
  </div>
</div>

<!-- =============================== APP SHELL =============================== -->
<div id="app">
  <div class="overlay-mask" id="sidebarMask" onclick="toggleSidebar(false)"></div>

  <aside class="sidebar" id="sidebar"><!-- filled by JS: buildSidebar() --></aside>

  <div class="main">

/* ============================================================
   1B. GENERATOR ATP & KKTP LANGSUNG DARI CP RESMI
   TP diturunkan langsung dari setiap klausa Capaian Pembelajaran (CP)
   Fase A (Kepbadan BSKAP No. 046/H/KR/2025) yang sudah dikutip di atas,
   dipasangkan dengan alokasi JP per Struktur Kurikulum Kelas 1 (lihat
   JP_STRUKTUR_KELAS1) dan dibagi proporsional ke Semester 1 / Semester 2.
   ============================================================ */
function lowerFirstChar(s){ return s ? s.charAt(0).toLowerCase()+s.slice(1) : s; }
function splitCPClauses(text){
  return text.split(/;\s+/).map(s=>s.trim().replace(/\.$/,"")).filter(Boolean);
}
function jpMingguForMapel(mapel){
  const row = JP_STRUKTUR_KELAS1.find(r=>r.mapel===mapel && r.jpMinggu>0);
  return row ? row.jpMinggu : 2;
}
function generateSeedATP(cpList){
  const list = cpList || SEED_CP_FASE_A;
  const out = [];
  const runningIndexByMapel = {};
  list.forEach(row=>{
    const clauses = splitCPClauses(row.cp).slice(0,2); // maksimal 2 TP per elemen agar ATP tetap ringkas dan terkelola
    clauses.forEach(clause=>{
      const idx = runningIndexByMapel[row.mapel] = (runningIndexByMapel[row.mapel]||0)+1;
      out.push({
        id: uid("atp"),
        mapel: row.mapel,
        elemen: row.elemen,
        tp: "Peserta didik mampu " + lowerFirstChar(clause) + ", melalui pengalaman belajar memahami, mengaplikasi, dan merefleksi (Pembelajaran Mendalam).",
        alokasiWaktu: String(jpMingguForMapel(row.mapel)),
        semester: (idx % 2 === 1) ? "1" : "2",
        fase: row.fase || "A",
      });
    });
  });
  return out;
}
function generateSeedKKTP(cpList){
  const list = cpList || SEED_CP_FASE_A;
  const mapels = [...new Set(list.map(r=>r.mapel))];
  const out = [];
  mapels.forEach(m=>{
    out.push({
      id: uid("kktp"), mapel:m,
      tp: "Seluruh Tujuan Pembelajaran (TP) mata pelajaran "+m+" pada Semester berjalan (lihat menu ATP).",
      kriteria: "Peserta didik menunjukkan pemahaman dan penerapan konsep sesuai indikator pada tiap TP, dinilai melalui observasi guru, unjuk kerja, dan hasil karya, mengacu pada 3 prinsip Pembelajaran Mendalam (berkesadaran, bermakna, menggembirakan) serta 8 Dimensi Profil Lulusan (Permendikdasmen No. 10/2025).",
      interval: "Berkembang Sesuai Harapan (70-84)"
    });
  });
  return out;
}

/* Mengosongkan struktur data (array->[], object bertingkat->key tetap
   ada tapi string dikosongkan) supaya kelas 2-6 dimulai KOSONG tanpa
   data karangan, namun bentuk field tetap konsisten dgn kelas 1. */
function emptyLike(val){
  if(Array.isArray(val)) return [];
  if(val && typeof val==="object"){
    const out={}; Object.keys(val).forEach(k=>{ out[k] = (typeof val[k]==="string") ? "" : emptyLike(val[k]); }); return out;
  }
  return val;
}
function defaultSharedDB(){
  const full = defaultDB();
  const shared = {}; SHARED_FIELDS.forEach(k=> shared[k]=full[k]);
  return shared;
}
function defaultClassDB(classId){
  const full = defaultDB();
  const out = {};
  Object.keys(full).forEach(k=>{
    if(SHARED_FIELDS.includes(k)) return;
    if(k==="cp" || k==="atp" || k==="kktp") return; // diisi khusus di bawah, fase-aware untuk SEMUA kelas
    out[k] = (classId==="kelas-1") ? full[k] : emptyLike(full[k]);
  });
  // CP/ATP/KKTP diisi otomatis sesuai fase kelas (A=Kelas1-2, B=Kelas3-4, C=Kelas5-6)
  // untuk SETIAP kelas (bukan hanya Kelas 1), mengikuti Kepka BSKAP No. 046/H/KR/2025
  // jo. Kepka BKPDM No. 020 Tahun 2026 (revisi khusus CP Pendidikan Agama & Budi Pekerti).
  const fase = faseForClassId(classId);
  const cpFase = cpSeedForFase(fase).map(e=>({...e}));
  out.cp = cpFase;
  out.atp = generateSeedATP(cpFase);
  out.kktp = generateSeedKKTP(cpFase);
  out.waliKelasId = (classId==="kelas-1") ? (full.sekolah.waliKelasId||"") : "";
  return out;
}

   dibiarkan utuh di localStorage (tidak dihapus) sebagai arsip cadangan. */
function runMultiClassMigrationIfNeeded(){
  if(localStorage.getItem(MIGRATION_FLAG_KEY)) return;
  try{
    const rawOld = localStorage.getItem(DB_KEY);
    if(rawOld){
      const old = JSON.parse(rawOld);
      const merged = Object.assign(defaultDB(), old);
      const shared = {}; SHARED_FIELDS.forEach(k=> shared[k]=merged[k]);
      const cls = {}; Object.keys(merged).forEach(k=>{ if(!SHARED_FIELDS.includes(k)) cls[k]=merged[k]; });
      cls.waliKelasId = merged.sekolah.waliKelasId || "";
      if(!localStorage.getItem(SHARED_KEY)) localStorage.setItem(SHARED_KEY, JSON.stringify(shared));
      if(!localStorage.getItem(classKey("kelas-1"))) localStorage.setItem(classKey("kelas-1"), JSON.stringify(cls));
    }
  }catch(e){ console.warn("Migrasi multi-kelas gagal, memakai data default.", e); }
  localStorage.setItem(MIGRATION_FLAG_KEY, "1");
}
function loadSharedDB(){
  try{ const raw = localStorage.getItem(SHARED_KEY); if(raw) return Object.assign(defaultSharedDB(), JSON.parse(raw)); }catch(e){}
  return defaultSharedDB();
}
function saveSharedDB(shared){ localStorage.setItem(SHARED_KEY, JSON.stringify(shared)); }
function loadClassDB(classId){
  try{ const raw = localStorage.getItem(classKey(classId)); if(raw) return Object.assign(defaultClassDB(classId), JSON.parse(raw)); }catch(e){}
  return defaultClassDB(classId);
}

  if(localStorage.getItem(CP_REVISI_2026_FLAG)) return;

function fmtDate(iso){ if(!iso) return "-"; const d=new Date(iso+"T00:00:00"); if(isNaN(d)) return iso; const bln=["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"]; return d.getDate()+" "+bln[d.getMonth()]+" "+d.getFullYear(); }

/* ============================================================
   2B. ARSIP DIGITAL - PENYIMPANAN FILE VIA INDEXEDDB
   ------------------------------------------------------------
   Modul terpisah dari sistem localStorage (SEDIA/db) yang sudah ada.
   Dipakai untuk menyimpan file guru berukuran besar (PDF/JPG/PNG/DOCX)
   secara 100% offline: Modul Ajar (upload file), Jurnal Mengajar
   (scan/OCR), dan Arsip Dokumen umum (ATP/CP/RPP/Administrasi/Lainnya).
   Tidak mengubah struktur data localStorage (db) yang sudah berjalan.
   ============================================================ */
const IDB_NAME = "tpsd2026_arsip_db";
const IDB_VERSION = 1;
const IDB_STORE = "files";
let _idbInstance = null;
function idbSupported(){ return typeof indexedDB !== "undefined"; }
function idbOpen(){
  return new Promise((resolve,reject)=>{
    if(_idbInstance){ resolve(_idbInstance); return; }
    if(!idbSupported()){ reject(new Error("IndexedDB tidak didukung oleh peramban ini.")); return; }
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = (e)=>{
      const dbx = e.target.result;
      if(!dbx.objectStoreNames.contains(IDB_STORE)){
        const store = dbx.createObjectStore(IDB_STORE, {keyPath:"id"});
        store.createIndex("kategori","kategori",{unique:false});
        store.createIndex("kelasId","kelasId",{unique:false});
        store.createIndex("mapel","mapel",{unique:false});
        store.createIndex("semester","semester",{unique:false});
        store.createIndex("tanggalUpload","tanggalUpload",{unique:false});
      }
    };
    req.onsuccess = (e)=>{ _idbInstance = e.target.result; resolve(_idbInstance); };
    req.onerror = (e)=>{ reject(e.target.error||new Error("Gagal membuka IndexedDB.")); };
  });
}
function idbPut(record){
  return idbOpen().then(dbx=>new Promise((resolve,reject)=>{
    const tx = dbx.transaction(IDB_STORE,"readwrite");
    tx.objectStore(IDB_STORE).put(record);
    tx.oncomplete = ()=>resolve(record);
    tx.onerror = (e)=>reject(e.target.error);
  }));
}
function idbGetAll(){
  return idbOpen().then(dbx=>new Promise((resolve,reject)=>{
    const tx = dbx.transaction(IDB_STORE,"readonly");
    const req = tx.objectStore(IDB_STORE).getAll();
    req.onsuccess = ()=>resolve(req.result||[]);
    req.onerror = (e)=>reject(e.target.error);
  }));
}
function idbGet(id){
  return idbOpen().then(dbx=>new Promise((resolve,reject)=>{
    const tx = dbx.transaction(IDB_STORE,"readonly");
    const req = tx.objectStore(IDB_STORE).get(id);
    req.onsuccess = ()=>resolve(req.result||null);
    req.onerror = (e)=>reject(e.target.error);
  }));
}
function idbDelete(id){
  return idbOpen().then(dbx=>new Promise((resolve,reject)=>{
    const tx = dbx.transaction(IDB_STORE,"readwrite");
    tx.objectStore(IDB_STORE).delete(id);
    tx.oncomplete = ()=>resolve();
    tx.onerror = (e)=>reject(e.target.error);
  }));
}
function formatUkuranFile(bytes){
  if(bytes==null) return "-";
  if(bytes < 1024) return bytes+" B";
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1)+" KB";
  return (bytes/(1024*1024)).toFixed(2)+" MB";
}
function fileIconFor(namaFile){
  const ext = (namaFile||"").split(".").pop().toLowerCase();
  if(["jpg","jpeg","png","gif","webp"].includes(ext)) return "image";
  if(ext==="pdf") return "doc";
  if(["doc","docx"].includes(ext)) return "doc";
  return "archive";
}

// Cache in-memory ringan agar render list tidak selalu menunggu Promise IndexedDB berulang kali dalam satu halaman.
let _arsipCache = null;
async function arsipRefreshCache(){ _arsipCache = await idbGetAll(); return _arsipCache; }
function arsipCacheOrEmpty(){ return _arsipCache || []; }

function arsipFilterMatches(r, filters){
  filters = filters || {};
  if(filters.kategori && r.kategori!==filters.kategori) return false;
  if(filters.kelasId && r.kelasId!==filters.kelasId && r.kelasId!=="all") return false;
  if(filters.mapel && r.mapel!==filters.mapel) return false;
  if(filters.semester && r.semester!==filters.semester) return false;
  if(filters.q){
    const q = filters.q.toLowerCase();
    const hay = [r.namaFile,r.mapel,r.bab,r.keterangan,r.ocrText].filter(Boolean).join(" ").toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}

async function renderArsipListInto(holderId, filters, sortDesc){
  const holder = document.getElementById(holderId);
  if(!holder) return;
  holder.innerHTML = `<p class="muted">Memuat arsip...</p>`;
  try{
    if(!idbSupported()){ holder.innerHTML = `<div class="empty-state">Peramban ini tidak mendukung IndexedDB -- penyimpanan file tidak tersedia. Data lain pada aplikasi tetap berjalan normal.</div>`; return; }
    const all = await arsipRefreshCache();
    let rows = all.filter(r=>arsipFilterMatches(r, filters));
    rows.sort((a,b)=> String(b.tanggalUpload||"").localeCompare(String(a.tanggalUpload||"")));
    holder.innerHTML = rows.length ? rows.map(arsipCardHtml).join("") : `<div class="empty-state">Belum ada file pada kategori/filter ini. Klik "Unggah Dokumen" untuk menambahkan.</div>`;
  }catch(e){ holder.innerHTML = `<div class="empty-state">Gagal memuat arsip: ${escapeHtml(e.message)}</div>`; }
}

  `;
  openModal({
    title: opts.title || "Unggah Dokumen",
    bodyHtml: fieldsHtml,
    footHtml: `<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="arsipUploadBtn">${ic("upload",15)} Unggah</button>`
  });

    const fileInput = document.getElementById("arsipFileInput");
    if(!fileInput.files.length){ toast("Pilih file terlebih dahulu."); return; }
    const file = fileInput.files[0];
    const btn = document.getElementById("arsipUploadBtn");
    btn.disabled = true; btn.textContent = "Mengunggah...";
    const record = {
      id: uid("arsip"),
      namaFile: file.name,
      tipeMime: file.type,
      ukuran: file.size,
      blob: file,
      tanggalUpload: todayISO(),
      kategori: (document.getElementById("f_kategori")||{}).value || "Dokumen Lain",
      kelasId: (document.getElementById("f_kelasId")||{}).value || "all",
      mapel: (document.getElementById("f_mapel")||{}).value || "",
      semester: (document.getElementById("f_semester")||{}).value || "",
      bab: (document.getElementById("f_bab")||{}).value || "",
      tanggalMengajar: opts.showTanggalMengajar ? ((document.getElementById("f_tanggalMengajar")||{}).value||"") : "",
      keterangan: (document.getElementById("f_keterangan")||{}).value || "",
      ocrText: "",
    };
    idbPut(record).then(()=>{
      toast("File berhasil diunggah & tersimpan offline.");
      closeModal();
      const wantOcr = opts.enableOcr && document.getElementById("arsipOcrCheck") && document.getElementById("arsipOcrCheck").checked;
      if(wantOcr) runOcrOnRecord(record.id, file);
      if(opts.onDone) opts.onDone();
    }).catch(e=>{
      toast("Gagal menyimpan file: "+e.message);
      btn.disabled=false; btn.textContent="Unggah";
    });
  };
}
let _tesseractLoadPromise = null;
function loadTesseractIfNeeded(){
  if(window.Tesseract) return Promise.resolve();
  if(_tesseractLoadPromise) return _tesseractLoadPromise;
  _tesseractLoadPromise = new Promise((resolve,reject)=>{
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js";
    s.onload = ()=>resolve();
    s.onerror = ()=>{ _tesseractLoadPromise=null; reject(new Error("Gagal memuat mesin OCR (perlu koneksi internet).")); };
    document.head.appendChild(s);
  });
  return _tesseractLoadPromise;
}
function runOcrOnRecord(recordId, file){
  toast("Memproses OCR di latar belakang...");
  loadTesseractIfNeeded()
    .then(()=> window.Tesseract.recognize(file, "ind+eng"))
    .then(({data})=> idbGet(recordId).then(rec=>{
      if(rec){ rec.ocrText = (data.text||"").trim(); return idbPut(rec); }
    }))
    .then(()=>{
      toast("OCR selesai, teks jurnal dapat dicari.");
      if(window._arsipOnRefresh) window._arsipOnRefresh();
    })
    .catch(()=>{ toast("OCR gagal/tidak tersedia (offline?). File asli tetap tersimpan."); });
}
function viewArsipFile(id){
  idbGet(id).then(rec=>{
    if(!rec){ toast("File tidak ditemukan."); return; }
    const url = URL.createObjectURL(rec.blob);
    const ext = (rec.namaFile||"").split(".").pop().toLowerCase();
    if(["jpg","jpeg","png","gif","webp"].includes(ext)){
      openModal({title:rec.namaFile, bodyHtml:`<img src="${url}" style="width:100%;border-radius:10px;">`, footHtml:`<button class="btn" onclick="closeModal()">Tutup</button><button class="btn btn-primary" onclick="downloadArsipFile('${id}')">${ic("download",14)} Unduh</button>`});
    } else {
      window.open(url, "_blank");
    }
    setTimeout(()=>URL.revokeObjectURL(url), 60000);
  }).catch(e=>toast("Gagal membuka file: "+e.message));
}
function downloadArsipFile(id){
  idbGet(id).then(rec=>{
    if(!rec){ toast("File tidak ditemukan."); return; }
    const url = URL.createObjectURL(rec.blob);
    const a = document.createElement("a"); a.href=url; a.download=rec.namaFile; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
  }).catch(e=>toast("Gagal mengunduh: "+e.message));
}
function replaceArsipFile(id){
  openModal({
    title:"Ganti File",
    bodyHtml:`<div class="field"><label>Pilih File Pengganti</label><input type="file" id="arsipReplaceInput"></div>`,
    footHtml:`<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="arsipReplaceBtn">${ic("check",15)} Ganti</button>`
  });
  document.getElementById("arsipReplaceBtn").onclick = ()=>{
    const inp = document.getElementById("arsipReplaceInput");
    if(!inp.files.length){ toast("Pilih file terlebih dahulu."); return; }
    const file = inp.files[0];
    idbGet(id).then(rec=>{
      if(!rec){ toast("File lama tidak ditemukan."); return; }
      rec.namaFile = file.name; rec.tipeMime = file.type; rec.ukuran = file.size; rec.blob = file; rec.tanggalUpload = todayISO();
      return idbPut(rec);
    }).then(()=>{
      toast("File berhasil diganti."); closeModal();
      if(window._arsipOnRefresh) window._arsipOnRefresh();
    }).catch(e=>toast("Gagal mengganti file: "+e.message));
  };
}
function deleteArsipFile(id){
  confirmDialog("Hapus file ini dari arsip? Tindakan tidak dapat dibatalkan.", ()=>{
    idbDelete(id).then(()=>{
      toast("File dihapus.");
      if(window._arsipOnRefresh) window._arsipOnRefresh();
    }).catch(e=>toast("Gagal menghapus: "+e.message));
  });
}

/* ============================================================
   5C. FIELD RENDER HELPER (dipakai form generik & custom)
   ============================================================ */
function fieldHtml(f, val){
  const v = val===undefined || val===null ? "" : val;
  const req = f.required ? "required" : "";
  if(f.type==="select"){
    const opts = (f.options||[]).map(o=>{
      const ov = typeof o==="object" ? o.value : o;
      const ol = typeof o==="object" ? o.label : o;
      return `<option value="${escapeHtml(ov)}" ${String(ov)===String(v)?"selected":""}>${escapeHtml(ol)}</option>`;
    }).join("");
    return `<div class="field"><label>${f.label}</label><select id="f_${f.key}" ${req}><option value="">- pilih -</option>${opts}</select></div>`;
  }
  if(f.type==="textarea"){
    return `<div class="field"><label>${f.label}</label><textarea id="f_${f.key}" ${req} placeholder="${f.placeholder||''}">${escapeHtml(v)}</textarea></div>`;
  }
  return `<div class="field"><label>${f.label}</label><input type="${f.type||'text'}" id="f_${f.key}" value="${escapeHtml(v)}" ${req} placeholder="${f.placeholder||''}"></div>`;
}
function readForm(fields){
  const out = {};
  fields.forEach(f=>{ const el = document.getElementById("f_"+f.key); out[f.key] = el ? el.value : ""; });
  return out;
}

   5D. GENERIC CRUD SECTION FACTORY
   Dipakai untuk banyak modul (siswa, kalender, agenda, ATP, KKTP,
   asesmen, kehadiran-catatan, perkembangan, home visit, inventaris,
   buku tamu, mutasi, arsip, supervisi, refleksi, modul ajar list).

function crudSection(cfg){
  // cfg: {store, title, desc, fields[], columns[], searchKeys[], onRowExtra, sortDefault}
  const rows = db[cfg.store];
  const stateKey = "crud_"+cfg.store+"_q";
  window[stateKey] = window[stateKey] || "";

  function list(){
    const q = (window[stateKey]||"").toLowerCase();
    let data = db[cfg.store].slice();
    if(q){
      data = data.filter(r => (cfg.searchKeys||cfg.columns.map(c=>c.key)).some(k => String(r[k]||"").toLowerCase().includes(q)));
    }
    return data;
  }

  const tableId = "tbl_"+cfg.store;

  function renderTable(){
    const data = list();
    if(data.length===0){
      return `<div class="empty-state">${ic("search",40)}<p>Belum ada data. Klik "Tambah" untuk mengisi.</p></div>`;
    }
    const head = cfg.columns.map(c=>`<th>${c.label}</th>`).join("")+"<th style='text-align:right'>Aksi</th>";
    const body = data.map(r=>{
      const tds = cfg.columns.map(c=>{
        let val = r[c.key];
        if(c.render) val = c.render(val, r);
        return `<td>${val==null?'':val}</td>`;
      }).join("");
      return `<tr><td>${data.indexOf(r)+1}</td>${tds}
        <td><div class="row-actions">
          <button class="btn btn-sm btn-icon" onclick="crudEdit('${cfg.store}','${r.id}')">${ic("edit",15)}</button>
          <button class="btn btn-sm btn-icon btn-danger" onclick="crudDelete('${cfg.store}','${r.id}')">${ic("trash",15)}</button>
        </div></td></tr>`;
    }).join("");
    return `<div class="table-wrap"><table><thead><tr><th>No</th>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
  }

  window["crudRefresh_"+cfg.store] = function(){
    document.getElementById(tableId).innerHTML = renderTable();
  };

  const html = `
    <div class="section-head">
      <div><h1>${cfg.title}</h1><div class="desc">${cfg.desc||""}</div></div>
      <div class="grow"></div>
      ${cfg.exportable!==false ? `<button class="btn" onclick="exportCSV('${cfg.store}')">${ic("download",15)} CSV</button>` : ""}
      <button class="btn btn-primary" onclick="crudAdd('${cfg.store}')">${ic("plus",15)} Tambah</button>
    </div>
    <div class="toolbar">
      <div class="search-box">${ic("search",16)}<input placeholder="Cari ${cfg.title.toLowerCase()}..." oninput="window['${stateKey}']=this.value; window['crudRefresh_${cfg.store}']();"></div>
    </div>
    <div id="${tableId}">${renderTable()}</div>
  `;
  CRUD_CONFIG[cfg.store] = cfg;
  return html;
}
const CRUD_CONFIG = {};

function crudAdd(store){
  const cfg = CRUD_CONFIG[store];
  openModal({
    title:"Tambah "+cfg.title,
    bodyHtml: cfg.fields.map(f=>fieldHtml(f,"")).join(""),
    footHtml:`<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="crudSaveBtn">${ic("check",15)} Simpan</button>`
  });
  document.getElementById("crudSaveBtn").onclick = ()=>{
    const data = readForm(cfg.fields);
    const missing = cfg.fields.find(f=>f.required && !data[f.key]);
    if(missing){ toast("Mohon isi: "+missing.label); return; }
    data.id = uid(store);
    db[store].push(data);
    saveDB(); closeModal(); toast("Data tersimpan.");
    if(window["crudRefresh_"+store]) window["crudRefresh_"+store]();
    if(window["dashRefresh"]) window.dashRefresh();
  };
}
function crudEdit(store, id){
  const cfg = CRUD_CONFIG[store];
  const row = db[store].find(r=>r.id===id);
  if(!row) return;
  openModal({
    title:"Ubah "+cfg.title,
    bodyHtml: cfg.fields.map(f=>fieldHtml(f,row[f.key])).join(""),
    footHtml:`<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="crudSaveBtn">${ic("check",15)} Simpan</button>`
  });
  document.getElementById("crudSaveBtn").onclick = ()=>{
    const data = readForm(cfg.fields);
    Object.assign(row, data);
    saveDB(); closeModal(); toast("Perubahan disimpan.");
    if(window["crudRefresh_"+store]) window["crudRefresh_"+store]();
  };
}
function crudDelete(store, id){
  confirmDialog("Hapus data ini? Tindakan tidak dapat dibatalkan.", ()=>{
    db[store] = db[store].filter(r=>r.id!==id);
    saveDB(); toast("Data dihapus.");
    if(window["crudRefresh_"+store]) window["crudRefresh_"+store]();
    if(window["dashRefresh"]) window.dashRefresh();
  });
}

/* ============================================================
   5E. EXPORT: CSV / "Word" (.doc) / "Excel" (.xls) / Print
   Teknik tanpa pustaka eksternal, tetap 100% offline:
   - CSV murni teks.
   - .doc  -> Blob HTML bertipe application/msword (dibuka native oleh MS Word).
   - .xls  -> Blob tabel HTML bertipe application/vnd.ms-excel (dibuka native oleh MS Excel).
   - PDF   -> memakai dialog cetak bawaan browser (Simpan sebagai PDF).
   ============================================================ */
function downloadBlob(content, filename, mime){
  const blob = new Blob([content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}
function withClassTag(filename){
  const tag = "_"+classFileTag(activeClassId);
  return filename.includes(tag) ? filename : filename+tag;
}
function exportCSV(store, customRows, customCols, filename){
  const cfg = CRUD_CONFIG[store];
  const cols = customCols || (cfg ? cfg.columns.map(c=>({key:c.key,label:c.label})) : []);
  const rows = customRows || db[store];
  let csv = cols.map(c=>'"'+c.label.replace(/"/g,'""')+'"').join(",")+"\r\n";
  rows.forEach(r=>{
    csv += cols.map(c=>{
      let v = r[c.key]; if(v==null) v="";
      return '"'+String(v).replace(/"/g,'""')+'"';
    }).join(",")+"\r\n";
  });
  downloadBlob("\ufeff"+csv, withClassTag(filename||store)+".csv", "text/csv;charset=utf-8;");
  toast("File CSV diunduh.");
}
function htmlToWordDoc(innerHtml, filename, title){
  const doc = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
  <head><meta charset="utf-8"><title>${escapeHtml(title||filename)}</title>
  <style>body{font-family:Calibri,Arial,sans-serif;font-size:12pt;} table{border-collapse:collapse;width:100%;} td,th{border:1px solid #333;padding:5px;font-size:10.5pt;}</style>
  </head><body>${innerHtml}</body></html>`;
  const fn = withClassTag(filename);
  downloadBlob(doc, fn.endsWith(".doc")?fn:fn+".doc", "application/msword");
  toast("File Word (.doc) diunduh.");
}
function htmlToExcelXls(tableHtml, filename, title){
  const doc = `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8">
  <!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>
  <x:Name>${escapeHtml(title||"Data")}</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions>
  </x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
  <style>td,th{border:1px solid #999;padding:4px;font-size:10.5pt;font-family:Calibri,Arial,sans-serif;} th{background:#dbe4ff;}</style>
  </head><body>${tableHtml}</body></html>`;
  const fn = withClassTag(filename);
  downloadBlob(doc, fn.endsWith(".xls")?fn:fn+".xls", "application/vnd.ms-excel");
  toast("File Excel (.xls) diunduh.");
}
function tableHtmlFromRows(cols, rows){
  let h = "<table><thead><tr><th>No</th>"+cols.map(c=>`<th>${c.label}</th>`).join("")+"</tr></thead><tbody>";
  rows.forEach((r,i)=>{ h += `<tr><td>${i+1}</td>`+cols.map(c=>`<td>${escapeHtml(r[c.key])}</td>`).join("")+"</tr>"; });
  h += "</tbody></table>";
  return h;
}

/* Menyusun ulang No. Absen agar selalu berurutan 1..N tanpa celah/duplikat,
   sesuai urutan No. Absen yang berlaku saat ini (mengikuti perubahan manual
   guru lewat field "No. Absen" pada form Tambah/Ubah). Dipanggil setelah
   setiap tambah/ubah/hapus/impor/pindah/naik kelas. */
function renumberSiswaArray(arr){
  arr.sort((a,b)=>{
    const na = Number(a.no); const nb = Number(b.no);
    const va = isNaN(na) ? 999999 : na, vb = isNaN(nb) ? 999999 : nb;
    return va - vb;
  });
  arr.forEach((s,i)=>{ s.no = i+1; });
  return arr;
}
// Ubah nomor absen langsung dari tabel (tanpa perlu buka form Ubah). Nomor
// baru akan menempatkan siswa pada urutan tersebut; siswa lain otomatis
// bergeser dan seluruh nomor dirapikan ulang 1..N lewat renumberSiswaArray.
function updateNoAbsenInline(id, inputEl){
  let val = Number(inputEl.value);
  if(isNaN(val) || val<1) val = 1;
  const s = db.siswa.find(x=>x.id===id);
  if(!s){ return; }
  s.no = val;
  renumberSiswaArray(db.siswa);
  saveDB();
  toast("Nomor absen "+s.nama+" diperbarui.");
  renderPage("siswa");
}
// Tukar nomor absen dengan siswa pada baris tepat di atas/bawahnya (hanya
// tersedia saat tabel diurutkan berdasarkan No. Absen).
function swapNoAbsen(id, direction){
  const sorted = db.siswa.slice().sort((a,b)=>(Number(a.no)||0)-(Number(b.no)||0));
  const idx = sorted.findIndex(x=>x.id===id);
  if(idx<0) return;
  const swapIdx = idx+direction;
  if(swapIdx<0 || swapIdx>=sorted.length) return;
  const a = sorted[idx], b = sorted[swapIdx];
  const tmp = a.no; a.no = b.no; b.no = tmp;
  renumberSiswaArray(db.siswa);
  saveDB();
  renderPage("siswa");
}

function bukaSiswaMasuk(){
  const masukFields = [
    {key:"jenisMasuk",label:"Jenis Penerimaan",type:"select",options:["Peserta Didik Baru","Pindahan / Mutasi Masuk"],required:true},
    {key:"tanggalMasuk",label:"Tanggal Masuk",type:"date",required:true},
    {key:"sekolahAsal",label:"Sekolah Asal (khusus Pindahan/Mutasi Masuk)"},
    {key:"keteranganMasuk",label:"Keterangan Tambahan",type:"textarea"},
  ];
  const allFields = masukFields.concat(siswaFields());
  openModal({
    title:"Siswa Masuk (Baru / Pindahan)",
    bodyHtml:`<p class="hint" style="margin-bottom:10px;">Lengkapi keterangan penerimaan di bagian atas, lalu data siswa di bawahnya. Data ini akan otomatis tercatat di Buku Mutasi Siswa sebagai riwayat "Masuk".</p>
      <div class="form-grid">${allFields.map(f=>fieldHtml(f, f.key==="tanggalMasuk"?todayISO():(f.key==="no"?(db.siswa.length+1):""))).join("")}</div>`,
    footHtml:`<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="saveSiswaMasukBtn">${ic("check",15)} Simpan</button>`
  });
  document.getElementById("saveSiswaMasukBtn").onclick = ()=>{
    const data = readForm(allFields);
    if(!data.nama){ toast("Nama siswa wajib diisi."); return; }
    if(!data.jenisMasuk){ toast("Pilih jenis penerimaan terlebih dahulu."); return; }
    if(!data.tanggalMasuk){ toast("Tanggal masuk wajib diisi."); return; }
    const { jenisMasuk, tanggalMasuk, sekolahAsal, keteranganMasuk, ...siswaData } = data;
    siswaData.id = uid("s");
    if(!siswaData.no || isNaN(Number(siswaData.no))) siswaData.no = db.siswa.length+1;
    db.siswa.push(siswaData);
    renumberSiswaArray(db.siswa);
    db.mutasi = db.mutasi || [];
    db.mutasi.push({
      id: uid("mut"),
      tanggal: tanggalMasuk,
      namaSiswa: siswaData.nama,
      jenis: "Masuk - " + jenisMasuk,
      asalTujuan: sekolahAsal || "",
      alasanKeluar: "",
      keterangan: keteranganMasuk || "",
      siswaId: siswaData.id,
    });
    saveDB(); closeModal();
    toast("Siswa baru tercatat sebagai \"Masuk\" dan ditambahkan ke roster kelas.");
    renderPage("siswa");
  };

/* ---- Import CSV sederhana (tanpa pustaka eksternal) ---- */
function parseCsvLine(line){
  const out=[]; let cur=""; let inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQ){
      if(ch==='"' && line[i+1]==='"'){ cur+='"'; i++; }
      else if(ch==='"'){ inQ=false; }
      else cur+=ch;
    } else {
      if(ch==='"') inQ=true;
      else if(ch===','){ out.push(cur); cur=""; }
      else cur+=ch;
    }
  }
  out.push(cur);
  return out;
}
function importSiswaCSV(){
  const inp = document.getElementById("importSiswaFile");
  if(!inp || !inp.files.length){ toast("Pilih file CSV terlebih dahulu."); return; }
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const text = String(e.target.result).replace(/^\ufeff/,"");
      const lines = text.split(/\r?\n/).filter(l=>l.trim().length);
      if(lines.length<2){ toast("File CSV kosong atau tidak berisi baris data. Pastikan file memiliki baris header + minimal 1 baris data."); return; }
      const rawHeaders = parseCsvLine(lines[0]).map(h=>h.trim());
      const keyMap = {}; siswaFields().forEach(f=>{ keyMap[f.label.toLowerCase()] = f.key; });
      const headers = rawHeaders.map(h=>{
        const norm = h.toLowerCase().replace(/\s+/g," ").trim();
        return keyMap[norm] || SISWA_CSV_HEADER_ALIAS[norm] || null;
      });
      const matchedCount = headers.filter(Boolean).length;
      if(matchedCount===0){
        toast("Header kolom CSV tidak dikenali. Gunakan tombol \"Unduh Template CSV\" untuk mendapatkan format yang benar, lalu isi data pada baris di bawah header.");
        return;
      }
      let added = 0, skipped = 0;
      for(let i=1;i<lines.length;i++){
        const cells = parseCsvLine(lines[i]);
        if(!cells.length) continue;
        const rec = {};
        headers.forEach((key,idx)=>{ if(key) rec[key] = (cells[idx]||"").trim(); });
        if(!rec.nama){ skipped++; continue; }
        if(rec.jk) rec.jk = rec.jk.toUpperCase().startsWith("P") ? "P" : (rec.jk.toUpperCase().startsWith("L") ? "L" : rec.jk);
        rec.id = uid("s");
        if(!rec.no || isNaN(Number(rec.no))) rec.no = db.siswa.length+1;
        db.siswa.push(rec); added++;
      }
      renumberSiswaArray(db.siswa);
      saveDB();
      if(added>0){
        toast(added+" siswa berhasil diimpor"+(skipped?(", "+skipped+" baris dilewati karena kolom Nama kosong"):"")+". No. Absen otomatis dirapikan.");
        inp.value = "";
      } else {
        toast("Tidak ada siswa yang berhasil diimpor -- pastikan kolom \"Nama Lengkap\" terisi pada setiap baris data.");
      }
      renderPage("siswa");
    }catch(err){ toast("Gagal membaca file CSV: "+err.message); }
  };
  reader.readAsText(inp.files[0]);
}

const KAL_BULAN = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const KAL_HARI_SINGKAT = ["Min","Sen","Sel","Rab","Kam","Jum","Sab"];
function isoOfYMD(y,m,d){ return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0"); }
function kalGetYearMonth(){
  if(window._kalYear==null || window._kalMonth==null){
    const now = new Date();
    window._kalYear = now.getFullYear();
    window._kalMonth = now.getMonth();
  }
  return {year:window._kalYear, month:window._kalMonth};
}
function kalChangeMonth(delta){
  const {year,month} = kalGetYearMonth();
  let m = month+delta, y = year;
  if(m<0){ m=11; y--; }
  if(m>11){ m=0; y++; }
  window._kalYear=y; window._kalMonth=m;
  renderPage("kalender");
}
function kalGotoToday(){
  const now = new Date();
  window._kalYear = now.getFullYear(); window._kalMonth = now.getMonth();
  renderPage("kalender");
}
function kalEventsOnDate(iso){
  return db.kalender.filter(k=>k.tanggal===iso).sort((a,b)=>String(a.pengingatJam||"").localeCompare(String(b.pengingatJam||"")));
}
function kalMenitLabel(menit){
  const map = {"0":"tepat pada jam tsb.","15":"15 menit sebelumnya","30":"30 menit sebelumnya","60":"1 jam sebelumnya","1440":"1 hari sebelumnya"};
  return map[String(menit)] || "tepat pada jam tsb.";
}
function buildKalenderGrid(year,month){
  const startOffset = new Date(year,month,1).getDay(); // 0=Minggu
  const daysInMonth = new Date(year,month+1,0).getDate();
  const todayStr = todayISO();
  let cells = "";
  for(let i=0;i<startOffset;i++) cells += `<div class="kal-cell kal-empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const iso = isoOfYMD(year,month,d);
    const dow = new Date(year,month,d).getDay();
    const events = kalEventsOnDate(iso);
    const isToday = iso===todayStr;
    const isWeekend = dow===0 || dow===6;
    const hasReminder = events.some(e=>e.pengingatAktif==="Ya");
    const dots = events.slice(0,4).map(e=>`<span class="dot" style="background:${kalJenisWarna(e.jenis)}" title="${escapeHtml(e.judul)}"></span>`).join("");
    cells += `<div class="kal-cell ${isToday?'kal-today':''} ${isWeekend?'kal-weekend':''}" onclick="openKalHari('${iso}')" title="${events.length} agenda">
      <div class="kal-daynum">${d}</div>
      <div class="kal-dots">${dots}</div>
      ${events.length>4?`<div class="kal-badgecount">+${events.length-4}</div>`:""}
      ${hasReminder?`<div class="kal-bell">${ic("bell",12)}</div>`:""}
    </div>`;
  }
  const trailing = (7 - ((startOffset+daysInMonth) % 7)) % 7;
  for(let i=0;i<trailing;i++) cells += `<div class="kal-cell kal-empty"></div>`;
  return `<div class="kal-grid">${KAL_HARI_SINGKAT.map(h=>`<div class="kal-weekday">${h}</div>`).join("")}${cells}</div>`;
}
function openKalHari(iso){

/* ---------- ALARM / PENGINGAT AGENDA KALDIK ---------- */
function requestNotifPermission(){
  if(typeof Notification==="undefined"){ toast("Peramban ini tidak mendukung notifikasi."); return; }
  Notification.requestPermission().then(perm=>{
    if(perm==="granted") toast("Notifikasi pengingat diaktifkan.");
    else toast("Izin notifikasi tidak diberikan. Pengingat tetap tampil sebagai info dalam aplikasi.");
    renderPage("kalender");
  });
}
function kalPlayBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type="sine"; osc.frequency.value=880;
    osc.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    osc.start();
    osc.stop(ctx.currentTime+0.35);
    setTimeout(()=>{ try{ ctx.close(); }catch(e){} }, 500);
  }catch(e){ /* abaikan jika Web Audio tidak tersedia */ }
}
function kalNotifiedKey(entryId){ return entryId+"_"+todayISO(); }
function kalGetNotifiedSet(){
  try{ return new Set(JSON.parse(localStorage.getItem("tpsd2026_kal_notified")||"[]")); }
  catch(e){ return new Set(); }
}
function kalSaveNotifiedSet(set){
  localStorage.setItem("tpsd2026_kal_notified", JSON.stringify([...set]));
}
function kalTriggerReminder(entry){
  toast(`Pengingat: ${entry.judul} (${entry.pengingatJam||''})`);
  kalPlayBeep();
  try{ if(navigator.vibrate) navigator.vibrate([200,100,200]); }catch(e){}
  if(typeof Notification!=="undefined" && Notification.permission==="granted"){
    try{
      new Notification("Pengingat Kaldik: "+entry.judul, {
        body: (entry.keterangan||"Saatnya untuk agenda ini.") + " ("+fmtDate(entry.tanggal)+" "+ (entry.pengingatJam||"") +")",
        tag: "kal_"+entry.id,
      });
    }catch(e){}
  }
}
function checkKalenderReminders(){
  try{
    if(!db || !Array.isArray(db.kalender)) return;
    const now = new Date();
    const notified = kalGetNotifiedSet();
    let changed = false;
    db.kalender.forEach(entry=>{
      if(entry.pengingatAktif!=="Ya" || !entry.pengingatJam) return;
      const key = kalNotifiedKey(entry.id);
      if(notified.has(key)) return;
      const [hh,mm] = String(entry.pengingatJam).split(":").map(n=>parseInt(n,10)||0);
      const target = new Date(entry.tanggal+"T00:00:00");
      target.setHours(hh, mm, 0, 0);
      target.setMinutes(target.getMinutes() - (parseInt(entry.pengingatMenit,10)||0));
      const diffMs = now - target;
      // Jendela toleransi 3 menit sejak waktu target agar tidak terlewat walau interval cek 60 detik.
      if(diffMs >= 0 && diffMs <= 3*60*1000){
        kalTriggerReminder(entry);
        notified.add(key); changed = true;
      }
    });
    if(changed) kalSaveNotifiedSet(notified);
  }catch(e){ console.warn("Gagal memeriksa pengingat kaldik.", e); }
}

// Hitung jumlah minggu efektif semester dari rentang tanggal Kalender
// Pendidikan (dibatasi oleh entri "Libur Semester").
function hitungMingguSemester(mulaiISO, akhirISO){
  const a = new Date(mulaiISO+"T00:00:00"), b = new Date(akhirISO+"T00:00:00");
  const hari = Math.round((b-a)/86400000);
  return Math.max(1, Math.round(hari/7));
}

function buildProgramSemesterText(){
  const s = db.sekolah;
  const isGanjil = (s.semester||"").includes("1");
  const bulanList = isGanjil
    ? [["Juli 2026","2026-07"],["Agustus 2026","2026-08"],["September 2026","2026-09"],["Oktober 2026","2026-10"],["November 2026","2026-11"],["Desember 2026","2026-12"]]
    : [["Januari 2027","2027-01"],["Februari 2027","2027-02"],["Maret 2027","2027-03"],["April 2027","2027-04"],["Mei 2027","2027-05"],["Juni 2027","2027-06"]];
  const semKey = isGanjil ? "1" : "2";
  const atpSem = db.atp.filter(a=>a.semester===semKey);
  const byMapel = {};
  atpSem.forEach(a=>{ (byMapel[a.mapel]=byMapel[a.mapel]||[]).push(a); });

  // Sebaran kegiatan penting bulan berjalan dari Kalender Pendidikan
  const kalenderBulanIni = m => db.kalender.filter(k=>k.tanggal.startsWith(m)).map(k=>`${fmtDate(k.tanggal)}: ${k.judul}`);

  let header = "No | Mata Pelajaran / TP".padEnd(58) + bulanList.map(b=>b[0].slice(0,3)).join(" | ") + "\n";
  header += "-".repeat(58+bulanList.length*6) + "\n";
  let body = "";
  let no = 1;
  Object.keys(byMapel).forEach(m=>{
    body += `${String(no++).padEnd(2)} | ${m}\n`;
    byMapel[m].forEach(tpRow=>{
      const label = "   - "+tpRow.tp.slice(0,70)+(tpRow.tp.length>70?"...":"");
      body += label.padEnd(58) + bulanList.map(()=>" .. ").join(" | ") + "\n";
    });
  });

  let kalenderInfo = "";
  bulanList.forEach(b=>{
    const items = kalenderBulanIni(b[1]);
    if(items.length) kalenderInfo += `\n${b[0]}:\n` + items.map(i=>"  - "+i).join("\n") + "\n";
  });

  return `PROGRAM SEMESTER
================
Satuan Pendidikan : ${s.namaSekolah}
Kelas / Fase      : ${s.kelas} / Fase A
Semester          : ${s.semester}
Tahun Ajaran      : ${s.tahunAjaran}

DASAR: Capaian Pembelajaran Fase A (Kepbadan BSKAP No. 046/H/KR/2025), Struktur Kurikulum (Permendikbudristek 12/2024 jo. Permendikdasmen 13/2025), dan Kalender Pendidikan Provinsi Jawa Tengah T.A. 2026/2027 (Kepdisdik Jateng No. 400.3/23862/2026).

${header}${body || " (Belum ada data ATP untuk semester ini - buka menu ATP lalu klik 'Buat/Segarkan Ulang dari CP', lalu buat ulang dokumen ini.)"}

II. AGENDA PENTING BULAN BERJALAN (dari menu Kalender Pendidikan)

- Asesmen formatif dilaksanakan menyatu dengan proses pembelajaran sepanjang semester.
- Asesmen sumatif lingkup materi/tengah semester/akhir semester dijadwalkan menyesuaikan Kalender Pendidikan satuan pendidikan.
- Kokurikuler (pembelajaran kolaboratif lintas disiplin / 7 Kebiasaan Anak Indonesia Hebat) dijadwalkan tersendiri di luar tabel intrakurikuler di atas.

Mengetahui,                                          ${db.sekolah.desa}, ${fmtDate(todayISO())}

${s.kepalaSekolah}                                    ${(db.guru.find(g=>g.id===s.waliKelasId)||{}).nama || "___________________"}
NIP. ${s.nipKepsek}                                   NIP. ${(db.guru.find(g=>g.id===s.waliKelasId)||{}).nip || "___________________"}`;

/* ---------- ASESMEN (Diagnostik / Formatif / Sumatif) ---------- */
function asesmenFields(jenis){
  const base = [
    {key:"siswaId",label:"Nama Siswa",type:"select",options:db.siswa.map(s=>({value:s.id,label:s.nama})),required:true},
    {key:"mapel",label:"Mata Pelajaran",type:"select",options:MAPEL_LIST,required:true},
    {key:"tanggal",label:"Tanggal",type:"date",required:true},
  ];
  if(jenis==="diag"){
    return base.concat([{key:"catatan",label:"Hasil Asesmen Diagnostik (kondisi awal, gaya belajar, dsb.)",type:"textarea",required:true}]);
  }
  return base.concat([
    {key:"nilai",label:"Nilai (0-100)",type:"number",required:true},
    {key:"lingkupMateri",label:"Lingkup Materi / Bab (opsional)"},
    {key:"semester",label:"Semester (opsional)",type:"select",options:[{value:"1",label:"Semester 1"},{value:"2",label:"Semester 2"}]},
    {key:"catatan",label:"Catatan/Umpan Balik",type:"textarea"},
  ]);
}
function asesmenPage(store, title, desc, jenis){
  const rows = db[store].slice();
  const siswaMap = Object.fromEntries(db.siswa.map(s=>[s.id,s.nama]));
  const q = (window["_q_"+store]||"").toLowerCase();
  const data = q ? rows.filter(r=>(siswaMap[r.siswaId]||"").toLowerCase().includes(q) || (r.mapel||"").toLowerCase().includes(q)) : rows;
  const body = data.map((r,i)=>`<tr><td>${i+1}</td><td><strong>${escapeHtml(siswaMap[r.siswaId]||"?")}</strong></td><td>${escapeHtml(r.mapel)}</td><td>${fmtDate(r.tanggal)}</td>
    <td>${jenis==="diag"? escapeHtml((r.catatan||"").slice(0,50))+((r.catatan||"").length>50?"...":"") : `<span class="badge ${r.nilai>=70?'badge-green':'badge-orange'}">${escapeHtml(r.nilai)}</span>`}</td>
    <td><div class="row-actions">
      <button class="btn btn-sm btn-icon" onclick="editAsesmen('${store}','${r.id}','${jenis}')">${ic("edit",15)}</button>
      <button class="btn btn-sm btn-icon btn-danger" onclick="crudDelete('${store}','${r.id}')">${ic("trash",15)}</button>
    </div></td></tr>`).join("");
  CRUD_CONFIG[store] = {store, title, fields:asesmenFields(jenis), columns:[]};
  return `
  <div class="section-head"><div><h1>${title}</h1><div class="desc">${desc}</div></div>
    <div class="grow"></div>
    <button class="btn" onclick="exportCSV('${store}', ${store}RowsForExport(), [{key:'nama',label:'Nama'},{key:'mapel',label:'Mapel'},{key:'tanggal',label:'Tanggal'},{key:'${jenis==='diag'?'catatan':'nilai'}',label:'${jenis==='diag'?'Catatan':'Nilai'}'}], '${store}')">${ic("download",15)} CSV</button>
    <button class="btn btn-primary" onclick="addAsesmen('${store}','${jenis}')">${ic("plus",15)} Tambah</button></div>
  <div class="toolbar"><div class="search-box">${ic("search",16)}<input placeholder="Cari nama siswa / mapel..." oninput="window['_q_${store}']=this.value; renderPage('${store==="asesmenDiagnostik"?"asesdiag":store==="asesmenFormatif"?"asesform":"asessum"}');"></div></div>
  <div class="table-wrap"><table><thead><tr><th>No</th><th>Siswa</th><th>Mapel</th><th>Tanggal</th><th>${jenis==="diag"?"Catatan":"Nilai"}</th><th style="text-align:right">Aksi</th></tr></thead>
  <tbody>${body || `<tr><td colspan="6" class="empty-state">Belum ada data.</td></tr>`}</tbody></table></div>`;
}
function asesmenDiagnostikRowsForExport(){ return exportRowsWithName("asesmenDiagnostik"); }
function asesmenFormatifRowsForExport(){ return exportRowsWithName("asesmenFormatif"); }
function asesmenSumatifRowsForExport(){ return exportRowsWithName("asesmenSumatif"); }
function exportRowsWithName(store){
  const siswaMap = Object.fromEntries(db.siswa.map(s=>[s.id,s.nama]));
  return db[store].map(r=>({...r, nama:siswaMap[r.siswaId]||"?"}));
}
function addAsesmen(store,jenis){
  openModal({title:"Tambah Data", bodyHtml: asesmenFields(jenis).map(f=>fieldHtml(f,"")).join(""),
    footHtml:`<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="saveAsesBtn">${ic("check",15)} Simpan</button>`});
  document.getElementById("saveAsesBtn").onclick=()=>{
    const data = readForm(asesmenFields(jenis));
    if(!data.siswaId||!data.mapel){ toast("Lengkapi data terlebih dahulu."); return; }
    data.id = uid(store); db[store].push(data); saveDB(); closeModal(); toast("Tersimpan.");
    renderPage(store==="asesmenDiagnostik"?"asesdiag":store==="asesmenFormatif"?"asesform":"asessum");
  };
}
function editAsesmen(store,id,jenis){
  const row = db[store].find(r=>r.id===id); if(!row) return;
  openModal({title:"Ubah Data", bodyHtml: asesmenFields(jenis).map(f=>fieldHtml(f,row[f.key])).join(""),
    footHtml:`<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="saveAsesBtn">${ic("check",15)} Simpan</button>`});
  document.getElementById("saveAsesBtn").onclick=()=>{
    Object.assign(row, readForm(asesmenFields(jenis))); saveDB(); closeModal(); toast("Perubahan disimpan.");
    renderPage(store==="asesmenDiagnostik"?"asesdiag":store==="asesmenFormatif"?"asesform":"asessum");
  };
}
/* ============================================================
   INPUT NILAI MASSAL (BULK) -- menulis ke store data yang SAMA
   dengan Asesmen Formatif/Sumatif (db.asesmenFormatif / db.asesmenSumatif)
   sehingga seluruh data tetap konsisten dan bisa dibuka/diedit satu-
   per-satu lewat menu Asesmen Formatif/Sumatif seperti biasa.
   ============================================================ */
function inputNilaiJenisStore(jenis){ return jenis==="Sumatif" ? "asesmenSumatif" : "asesmenFormatif"; }
function inputNilaiDraftKey(ctx){
  return "tpsd2026_draftnilai_"+[activeClassId, ctx.mapel, ctx.jenis, ctx.bab, ctx.semester].map(s=>String(s||"").replace(/[^a-zA-Z0-9]/g,"_")).join("__");
}
function inputNilaiGetCtx(){
  const ctx = window._inputNilaiCtx || {mapel:MAPEL_LIST[0], jenis:"Formatif", bab:"Umum", semester:"1"};
  window._inputNilaiCtx = ctx;
  return ctx;
}
function inputNilaiExistingMap(ctx){
  const store = inputNilaiJenisStore(ctx.jenis);
  const map = {};
  (db[store]||[]).forEach(r=>{
    if(r.mapel!==ctx.mapel) return;
    if(String(r.lingkupMateri||"")!==String(ctx.bab||"")) return;
    if(String(r.semester||"")!==String(ctx.semester||"")) return;
    map[r.siswaId] = r;
  });
  return map;
}
function inputNilaiLoadDraft(ctx){
  try{ return JSON.parse(localStorage.getItem(inputNilaiDraftKey(ctx))||"{}"); }catch(e){ return {}; }
}
function inputNilaiSaveDraft(ctx, draftObj){
  try{ localStorage.setItem(inputNilaiDraftKey(ctx), JSON.stringify(draftObj)); }catch(e){}
}
function inputNilaiClearDraft(ctx){
  try{ localStorage.removeItem(inputNilaiDraftKey(ctx)); }catch(e){}
}
PAGES.inputnilai = function(){
  const ctx = inputNilaiGetCtx();
  setTimeout(()=>inputNilaiRenderTable(), 0);
  return `
  <div class="section-head"><div><h1>Input Nilai Massal</h1><div class="desc">${escapeHtml(classInfo(activeClassId).label)} &middot; Pilih Mapel, Jenis Penilaian, Lingkup Materi/Bab, dan Semester, lalu isi nilai seluruh siswa langsung dari daftar di bawah. Data tersimpan ke tempat yang sama dengan menu Asesmen Formatif/Sumatif.</div></div></div>
  <div class="card" style="margin-bottom:16px;">
    <div class="form-grid">
      <div class="field"><label>Mata Pelajaran</label><select id="niMapel" onchange="inputNilaiUpdateCtxAndRender()">
        ${MAPEL_LIST.map(m=>`<option value="${escapeHtml(m)}" ${m===ctx.mapel?"selected":""}>${escapeHtml(m)}</option>`).join("")}
      </select></div>
      <div class="field"><label>Jenis Penilaian</label><select id="niJenis" onchange="inputNilaiUpdateCtxAndRender()">
        <option value="Formatif" ${ctx.jenis==="Formatif"?"selected":""}>Asesmen Formatif</option>
        <option value="Sumatif" ${ctx.jenis==="Sumatif"?"selected":""}>Asesmen Sumatif</option>
      </select></div>
      <div class="field"><label>Lingkup Materi / Bab</label><input type="text" id="niBab" value="${escapeHtml(ctx.bab)}" placeholder="cth: Bab 3 - Pecahan" onchange="inputNilaiUpdateCtxAndRender()"></div>
      <div class="field"><label>Semester</label><select id="niSemester" onchange="inputNilaiUpdateCtxAndRender()">
        <option value="1" ${ctx.semester==="1"?"selected":""}>Semester 1</option>
        <option value="2" ${ctx.semester==="2"?"selected":""}>Semester 2</option>
      </select></div>
    </div>
  </div>
  <div id="niStatsHolder"></div>
  <div class="card" style="margin-bottom:16px;">
    <div class="toolbar" style="margin-bottom:0;">
      <button class="btn btn-primary" onclick="inputNilaiSimpanSemua()">${ic("check",15)} Simpan Semua</button>
      <button class="btn" onclick="inputNilaiIsiSemua()">${ic("edit",15)} Isi Semua</button>
      <button class="btn" onclick="inputNilaiCopyPrevious()">${ic("layers",15)} Copy Nilai dari Penilaian Sebelumnya</button>
      <div class="grow"></div>
      <span class="hint" id="niAutosaveLabel">Draf tersimpan otomatis di perangkat ini.</span>
    </div>
  </div>
  <div id="niTableHolder"><p class="muted">Memuat daftar siswa...</p></div>`;
};
function inputNilaiUpdateCtxAndRender(){
  const ctx = inputNilaiGetCtx();
  ctx.mapel = document.getElementById("niMapel").value;
  ctx.jenis = document.getElementById("niJenis").value;
  ctx.bab = document.getElementById("niBab").value || "Umum";
  ctx.semester = document.getElementById("niSemester").value;
  inputNilaiRenderTable();
}
function inputNilaiComputeRowValue(ctx, siswaId, existingMap, draft){
  if(Object.prototype.hasOwnProperty.call(draft, siswaId)) return draft[siswaId];
  if(existingMap[siswaId]) return existingMap[siswaId].nilai;
  return "";
}
function inputNilaiRenderTable(){
  const ctx = inputNilaiGetCtx();
  const holder = document.getElementById("niTableHolder");
  if(!holder) return;
  const existingMap = inputNilaiExistingMap(ctx);
  const draft = inputNilaiLoadDraft(ctx);
  const siswaList = db.siswa.slice();
  const rows = siswaList.map((s,i)=>{
    const val = inputNilaiComputeRowValue(ctx, s.id, existingMap, draft);
    const filled = val!=="" && val!=null;
    return `<tr id="niRow_${s.id}" class="${filled?'ni-row-filled':''}">
      <td>${i+1}</td>
      <td><strong>${escapeHtml(s.nama)}</strong></td>
      <td><input type="number" min="0" max="100" step="1" class="ni-input" id="niInput_${s.id}" data-siswaid="${s.id}" data-index="${i}"
        value="${escapeHtml(val)}" placeholder="0-100"
        oninput="inputNilaiOnInput('${s.id}', this)"
        onkeydown="inputNilaiHandleKeydown(event, ${i})"></td>
    </tr>`;
  }).join("");
  holder.innerHTML = `<div class="table-wrap"><table><thead><tr><th style="width:50px;">No</th><th>Nama Siswa</th><th style="width:140px;">Nilai (0-100)</th></tr></thead>
    <tbody>${rows || `<tr><td colspan="3" class="empty-state">Belum ada data siswa.</td></tr>`}</tbody></table></div>`;
  inputNilaiRenderStats();
}
function inputNilaiOnInput(siswaId, inputEl){
  const ctx = inputNilaiGetCtx();
  let val = inputEl.value;
  if(val!==""){
    let num = Number(val);
    if(isNaN(num)) num = 0;
    if(num<0) num = 0;
    if(num>100) num = 100;
    if(String(num)!==val) inputEl.value = num;
    val = num;
  }
  const draft = inputNilaiLoadDraft(ctx);
  if(val==="") delete draft[siswaId]; else draft[siswaId] = val;
  inputNilaiSaveDraft(ctx, draft);
  const row = document.getElementById("niRow_"+siswaId);
  if(row) row.classList.toggle("ni-row-filled", val!=="" && val!=null);
  inputNilaiRenderStats();
}
function inputNilaiHandleKeydown(e, index){
  if(e.key==="Enter"){
    e.preventDefault();
    const next = document.querySelector(`.ni-input[data-index="${index+1}"]`);
    if(next) next.focus();
  }
}
function inputNilaiRenderStats(){
  const ctx = inputNilaiGetCtx();
  const statsHolder = document.getElementById("niStatsHolder");
  if(!statsHolder) return;
  const inputs = document.querySelectorAll(".ni-input");
  const values = [];
  inputs.forEach(inp=>{ if(inp.value!=="") values.push(Number(inp.value)); });
  const total = inputs.length;
  const terisi = values.length;
  const belum = total - terisi;
  const tertinggi = values.length ? Math.max(...values) : 0;
  const terendah = values.length ? Math.min(...values) : 0;
  const rata = values.length ? (values.reduce((a,b)=>a+b,0)/values.length).toFixed(1) : "0.0";
  statsHolder.innerHTML = `<div class="grid grid-4" style="margin-bottom:16px;">
    <div class="card stat-card"><div class="num">${total}</div><div class="lbl">Jumlah Siswa</div></div>
    <div class="card stat-card"><div class="num" style="color:var(--accent);">${terisi}</div><div class="lbl">Sudah Diisi</div></div>
    <div class="card stat-card"><div class="num" style="color:var(--warn);">${belum}</div><div class="lbl">Belum Diisi</div></div>
    <div class="card stat-card"><div class="num">${rata}</div><div class="lbl">Rata-rata (Tertinggi ${tertinggi} / Terendah ${terendah})</div></div>
  </div>`;
}
function inputNilaiIsiSemua(){
  const val = prompt("Isi nilai untuk SELURUH siswa pada daftar ini (0-100):", "80");
  if(val===null) return;
  let num = Number(val);
  if(isNaN(num) || num<0 || num>100){ toast("Nilai harus berupa angka 0-100."); return; }
  document.querySelectorAll(".ni-input").forEach(inp=>{
    inp.value = num;
    inputNilaiOnInput(inp.dataset.siswaid, inp);
  });
  toast("Seluruh nilai diisi "+num+". Jangan lupa klik \"Simpan Semua\".");
}
function inputNilaiCopyPrevious(){
  const ctx = inputNilaiGetCtx();
  const store = inputNilaiJenisStore(ctx.jenis);
  const candidates = (db[store]||[]).filter(r=>r.mapel===ctx.mapel && !(String(r.lingkupMateri||"")===String(ctx.bab||"") && String(r.semester||"")===String(ctx.semester||"")));
  if(!candidates.length){ toast("Belum ada data penilaian sebelumnya untuk mapel ini."); return; }
  const combos = {};
  candidates.forEach(r=>{
    const key = (r.lingkupMateri||"Umum")+"__"+(r.semester||"-");
    if(!combos[key]) combos[key] = {label:(r.lingkupMateri||"Umum")+" (Semester "+(r.semester||"-")+")", tanggal:r.tanggal, entries:[]};
    combos[key].entries.push(r);
    if(r.tanggal > combos[key].tanggal) combos[key].tanggal = r.tanggal;
  });
  const comboList = Object.values(combos).sort((a,b)=>String(b.tanggal).localeCompare(String(a.tanggal)));
  const optionsHtml = comboList.map((c,i)=>`<option value="${i}">${escapeHtml(c.label)} - terakhir ${fmtDate(c.tanggal)}</option>`).join("");
  openModal({
    title:"Copy Nilai dari Penilaian Sebelumnya",
    bodyHtml:`<div class="field"><label>Pilih penilaian sumber</label><select id="niCopySrc">${optionsHtml}</select></div>
      <p class="hint">Nilai akan disalin ke kolom yang MASIH KOSONG saja. Nilai yang sudah diisi tidak akan tertimpa.</p>`,
    footHtml:`<button class="btn" onclick="closeModal()">Batal</button><button class="btn btn-primary" id="niCopyBtn">${ic("check",15)} Salin</button>`
  });
  document.getElementById("niCopyBtn").onclick = ()=>{
    const idx = Number(document.getElementById("niCopySrc").value);
    const chosen = comboList[idx];
    let count = 0;
    chosen.entries.forEach(r=>{
      const inp = document.getElementById("niInput_"+r.siswaId);
      if(inp && inp.value===""){ inp.value = r.nilai; inputNilaiOnInput(r.siswaId, inp); count++; }
    });
    closeModal();
    toast(count+" nilai disalin ke kolom yang masih kosong. Jangan lupa klik \"Simpan Semua\".");
  };
}
function inputNilaiSimpanSemua(){
  const ctx = inputNilaiGetCtx();
  const store = inputNilaiJenisStore(ctx.jenis);
  const existingMap = inputNilaiExistingMap(ctx);
  const inputs = document.querySelectorAll(".ni-input");
  let tersimpan = 0;
  inputs.forEach(inp=>{
    const siswaId = inp.dataset.siswaid;
    if(inp.value===""){
      // Jika sebelumnya ada data namun sekarang dikosongkan, biarkan data lama (tidak menghapus otomatis demi keamanan data).
      return;
    }
    let nilai = Number(inp.value);
    if(isNaN(nilai)) return;
    if(nilai<0) nilai=0; if(nilai>100) nilai=100;
    if(existingMap[siswaId]){
      existingMap[siswaId].nilai = nilai;
      existingMap[siswaId].tanggal = existingMap[siswaId].tanggal || todayISO();
    } else {
      db[store].push({
        id: uid(store), siswaId, mapel: ctx.mapel, tanggal: todayISO(),
        nilai, lingkupMateri: ctx.bab, semester: ctx.semester, catatan: "",
      });
    }
    tersimpan++;
  });
  saveDB();
  inputNilaiClearDraft(ctx);
  toast(tersimpan+" nilai berhasil disimpan ke "+(ctx.jenis==="Sumatif"?"Asesmen Sumatif":"Asesmen Formatif")+".");
  inputNilaiRenderTable();
}

PAGES.rekapnilai = function(){
  const mapelSel = window._rekapMapel || MAPEL_LIST[0];
  const jenisSel = window._rekapJenis || "asesmenSumatif";
  const rows = db[jenisSel].filter(r=>r.mapel===mapelSel);
  const bySiswa = {};
  rows.forEach(r=>{ if(!bySiswa[r.siswaId]) bySiswa[r.siswaId]=[]; bySiswa[r.siswaId].push(Number(r.nilai)||0); });
  const table = db.siswa.map(s=>{
    const arr = bySiswa[s.id]||[];
    const avg = arr.length? (arr.reduce((a,b)=>a+b,0)/arr.length) : null;
    let predikat = "-";
    if(avg!=null){ predikat = avg>=85?"Sangat Berkembang":avg>=70?"Berkembang Sesuai Harapan":avg>=60?"Mulai Berkembang":"Belum Berkembang"; }
    return {nama:s.nama, jumlah:arr.length, rata:avg==null?"-":avg.toFixed(1), predikat};
  });
  const body = table.map((r,i)=>`<tr><td>${i+1}</td><td><strong>${escapeHtml(r.nama)}</strong></td><td>${r.jumlah}</td><td>${r.rata}</td>
    <td><span class="badge ${r.predikat==='Sangat Berkembang'?'badge-green':r.predikat==='Berkembang Sesuai Harapan'?'badge-blue':r.predikat==='Mulai Berkembang'?'badge-orange':'badge-red'}">${r.predikat}</span></td></tr>`).join("");
  return `
  <div class="section-head"><div><h1>Rekap Nilai</h1><div class="desc">Rata-rata nilai per siswa berdasarkan mata pelajaran & jenis asesmen terpilih.</div></div>
    <div class="grow"></div>
    <button class="btn" onclick="exportRekapExcel()">${ic("bar",15)} Excel</button>
    <button class="btn" onclick="printRekap()">${ic("print",15)} Cetak</button></div>
  <div class="toolbar">
    <select style="padding:10px;border-radius:11px;border:1px solid var(--border);" onchange="window._rekapJenis=this.value; renderPage('rekapnilai');">
      <option value="asesmenFormatif" ${jenisSel==='asesmenFormatif'?'selected':''}>Asesmen Formatif</option>
      <option value="asesmenSumatif" ${jenisSel==='asesmenSumatif'?'selected':''}>Asesmen Sumatif</option>
    </select>
    <select style="padding:10px;border-radius:11px;border:1px solid var(--border);" onchange="window._rekapMapel=this.value; renderPage('rekapnilai');">
      ${MAPEL_LIST.map(m=>`<option value="${escapeHtml(m)}" ${m===mapelSel?"selected":""}>${escapeHtml(m)}</option>`).join("")}
    </select>
  </div>
  <div id="rekapTableHolder" class="table-wrap"><table><thead><tr><th>No</th><th>Nama Siswa</th><th>Jumlah Data</th><th>Rata-rata</th><th>Predikat</th></tr></thead>
  <tbody>${body}</tbody></table></div>`;
